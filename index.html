<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wyrm - Online Compiler</title>
  <meta name="description" content="Wyrm is a modern, statically-typed systems programming language with C/C++ and Rust-comparable performance. Try it in your browser.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Spectral:wght@600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
</head>

<body>

  <div class="topbar">
    <div class="brand">Wyrm<span>://</span><small>ONLINE COMPILER</small></div>
    <div class="status" id="status"><span class="dot"></span><span id="status-text">Loading Python runtime...</span>
    </div>
    <div class="topbar-right">
      <button class="theme-btn" id="theme-btn" title="Toggle Light / Dark">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 4V2m0 20v-2m8-8h2M2 12h2m13.66-6.66 1.41-1.41M4.93 19.07l1.41-1.41m0-11.32L4.93 4.93m14.14 14.14-1.41-1.41M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0z" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round" />
        </svg>
      </button>
      <button class="run-btn" id="run-btn" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z" />
        </svg>
        Run
      </button>
    </div>
  </div>

  <div class="workspace">
    <div class="pane editor-pane">
      <div class="pane-header"><span>main.wyr</span></div>
      <div class="examples" id="examples"></div>
      <div class="editor-body">
        <div class="gutter" id="gutter">1</div>
        <textarea id="code-input" spellcheck="false"
          placeholder="fn main() {&#10;    print(&quot;Hello World&quot;)&#10;}" disabled></textarea>
      </div>
    </div>

    <div class="pane console-pane">
      <div class="pane-header">
        <span>output</span>
        <span class="action" id="clear-btn">clear</span>
      </div>
      <div id="output">
        <div class="line-sys">Waiting for Pyodide to load...</div>
      </div>
    </div>
  </div>

  <footer>input() is not supported in the browser - Ctrl/Cmd+Enter to run quickly</footer>

  <!-- Wyrm Python sources (auto-generated, do not edit) -->
  <script src="wyrm-sources.js"></script>
  <script src="script.js"></script>
</body>

</html>
