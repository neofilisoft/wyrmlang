    type="application/json">{"__init__.py": "\"\"\"Wyrm Language Interpreter\"\"\"\n\n__version__ = \"1.0.0\"\n__author__ = \"Neofilisoft\"\n__email__ = \"breakm82a1@gmail.com\"", "ast.py": "# AST Node classes for the Wyrm language\n# These are imported by both parser and interpreter\n\nclass ASTNode:\n    pass\n\nclass NumberNode(ASTNode):\n    def __init__(self, token):\n        self.token = token\n        self.value = token.value\n\n    def __repr__(self):\n        return f\"NumberNode({self.value})\"\n\nclass StringNode(ASTNode):\n    def __init__(self, token):\n        self.token = token\n        self.value = token.value\n\n    def __repr__(self):\n        return f\"StringNode({self.value})\"\n\nclass BooleanNode(ASTNode):\n    def __init__(self, token):\n        self.token = token\n        self.value = token.value == 'true'\n\n    def __repr__(self):\n        return f\"BooleanNode({self.value})\"\n\nclass NoneNode(ASTNode):\n    def __init__(self, token):\n        self.token = token\n        self.value = None\n\n    def __repr__(self):\n        return \"NoneNode()\"\n\nclass IdentifierNode(ASTNode):\n    def __init__(self, token):\n        self.token = token\n        self.name = token.value\n\n    def __repr__(self):\n        return f\"IdentifierNode({self.name})\"\n\nclass BinaryOpNode(ASTNode):\n    def __init__(self, left, op, right):\n        self.left = left\n        self.op = op\n        self.right = right\n\n    def __repr__(self):\n        return f\"BinaryOpNode({self.left}, {self.op.value}, {self.right})\"\n\nclass UnaryOpNode(ASTNode):\n    def __init__(self, op, expr):\n        self.op = op\n        self.expr = expr\n\n    def __repr__(self):\n        return f\"UnaryOpNode({self.op.value}, {self.expr})\"\n\nclass AssignmentNode(ASTNode):\n    def __init__(self, var_name, value, is_declaration=False, declaration_type=None):\n        self.var_name = var_name\n        self.value = value\n        self.is_declaration = is_declaration  # True if this is a dexNode({self.obj}, {self.index})\"\n\n\nclass ReturnNode(ASTNode):\n    def __init__(self, expr):\n        self.expr = expr\n\n    def __repr__(self):\n        return f\"ReturnNode({self.expr})\"", "lexer.py": "import re\nfrom typing import List, Tuple, Optional, Union\n\n# Token types\nTT_INT = 'INT'\nTT_FLOAT = 'FLOAT'\nTT_STRING = 'STRING'\nTT_IDENTIFIER = 'IDENTIFIER'\nTT_KEYWORD = 'KEYWORD'\nTT_OPERATOR = 'OPERATOR'\nTT_DELIMITER = 'DELIMITER'\nTT_COMMENT = 'COMMENT'\nTT_NEWLINE = 'NEWLINE'\nTT_EOF = 'EOF'\n\n# Keywords\nKEYWORDS = {\n    'fn', 'true', 'false', 'null',\n    'if', 'elif', 'else',\n    'repeat', 'til',\n    'print', 'input',\n    'int', 'float', 'str',\n    'len', 'append', 'pop',\n    'return',\n    'var', 'dec'\n}\n\n# Operators - characters that can start an operator\nOPERATORS = {'+', '-', '*', '/', '%', '=', '!', '<', '>', '&', '|'}\n\n# Complete operators (for checking what we've built)\nOPERATOR_KEYS = {\n    '+', '-', '*', '/', '//', '%',\n    '=', '+=', '-=', '*=', '/=', '%=',\n    '==', '!=', '<', '>', '<=', '>=',\n    '&', '&&', '|', '||',\n    '!',\n    'and', 'or', 'not'\n}\n\n# Delimiters\nDELIMITERS = {\n    '(', ')', '{', '}', '[', ']',\n    ',', ':', ';', '.'\n}\n\nclass Token:\n    def __init__(self, type: str, value: Union[str, int, float], line: int, column: int):\n        self.type = type\n        self.value = value\n        self.line = line\n        self.column = column\n\n    def __repr__(self):\n        return f\"Token({self.type}, {repr(self.value)}, line={self.line}, col={self.column})\"\n\nclass Lexer:\n    def __init__(self, text: str):\n        self.text = text\n        self.pos = 0\n        self.line = 1\n        self.column = 1\n        self.current_char = self.text[0] if self.text else None\n\n    def advance(self):\n        \"\"\"Advance to the next character.\"\"\"\n        if self.current_char == '\\n':\n            self.line += 1\n            self.column = 1\n        elif self.current_char is not None:\n            self.column += 1\n\n        self.pos += 1\n        if self.pos >= len(self.text):\n            self.current_char = None\n        else:\n            self.current_char = self.text[self.pos]\n\n    def peek(self, n: int = 1) -> Optional[str]:\n        \"\"\"Look ahead n characters without consuming.\"\"\"\n        peek_pos = self.pos + n\n        if peek_pos >= len(self.text):\n            return None\n        return self.text[peek_pos]\n\n    def skip_whitespace(self):\n        \"\"\"Skip whitespace characters.\"\"\"\n        while self.current_char is not None and self.current_char.isspace():\n            self.advance()\n\n    def skip_comment(self):\n        \"\"\"Skip single-line comment.\"\"\"\n        while self.current_char is not None and self.current_char != '\\n':\n            self.advance()\n\n    def read_number(self) -> Token:\n        \"\"\"Read a number (int or float).\"\"\"\n        result = ''\n        dot_count = 0\n\n        while self.current_char is not None and (self.current_char.isdigit() or self.current_char == '.'):\n            if self.current_char == '.':\n                dot_count += 1\n                if dot_count > 1:\n                    break  # Only one decimal point allowed\n            result += self.current_char\n            self.advance()\n\n        if dot_count == 1:\n            return Token(TT_FLOAT, float(result), self.line, self.column - len(result))\n        else:\n            return Token(TT_INT, int(result), self.line, self.column - len(result))\n\n    def read_string(self) -> Token:\n        \"\"\"Read a string literal.\"\"\"\n        quote_char = self.current_char  # Either \" or '\n        self.advance()  # Skip opening quote\n\n        result = ''\n        while self.current_char is not None and self.current_char != quote_char:\n            if self.current_char == '\\\\':  # Handle escape sequences\n                self.advance()\n                if self.current_char == 'n':\n                    result += '\\n'\n                elif self.current_char == 't':\n                    result += '\\t'\n                elif self.current_char == 'r':\n                    result += '\\r'\n                elif self.current_char == '\\\\':\n                    result += '\\\\'\n                elif self.current_char == quote_char:\n                    result += quote_char\n                else:\n                    result += self.current_char  # Unknown escape, keep as-is\n            else:\n                result += self.current_char\n            self.advance()\n\n        if self.current_char == quote_char:\n            self.advance()  # Skip closing quote\n        return Token(TT_STRING, result, self.line, self.column - len(result) - 1)\n\n    def read_identifier(self) -> Token:\n        \"\"\"Read an identifier or keyword.\"\"\"\n        result = ''\n        while self.current_char is not None and (self.current_char.isalnum() or self.current_char == '_'):\n            result += self.current_char\n            self.advance()\n\n        if result in KEYWORDS:\n            return Token(TT_KEYWORD, result, self.line, self.column - len(result))\n        else:\n            return Token(TT_IDENTIFIER, result, self.line, self.column - len(result))\n\n    def tokenize(self) -> List[Token]:\n        \"\"\"Convert input text into a list of tokens.\"\"\"\n        tokens = []\n\n        while self.current_char is not None:\n            if self.current_char.isspace():\n                if self.current_char == '\\n':\n                    tokens.append(Token(TT_NEWLINE, '\\n', self.line, self.column))\n                self.advance()\n\n            elif self.current_char.isdigit():\n                tokens.append(self.read_number())\n\n            elif self.current_char in ('\"', \"'\"):\n                tokens.append(self.read_string())\n\n            elif self.current_char.isalpha() or self.current_char == '_':\n                tokens.append(self.read_identifier())\n\n            elif self.current_char == '/' and self.peek() == '/':\n                # Single-line comment\n                self.skip_comment()\n                # Don't add comment token for now (can be added if needed)\n\n            elif self.current_char in OPERATORS:\n                # Find the longest matching operator starting at current position\n                op = \"\"\n                # Check progressively longer substrings\n                for i in range(1, min(10, len(self.text) - self.pos + 1)):  # up to 10 chars or end of string\n                    substring = self.text[self.pos:self.pos + i]\n                    if substring in OPERATOR_KEYS:\n                        op = substring  # keep the longest match found\n                    else:\n                        # If this substring isn't an operator, longer ones won't be either\n                        break\n\n                if op:  # we found a matching operator\n                    # Record starting position\n                    start_line = self.line\n                    start_column = self.column\n                    # Consume the operator characters\n                    for _ in range(len(op)):\n                        self.advance()\n                    tokens.append(Token(TT_OPERATOR, op, start_line, start_column))\n                else:\n                    # Fallback: treat as single character (shouldn't happen)\n                    start_line = self.line\n                    start_column = self.column\n                    self.advance()\n                    tokens.append(Token(TT_OPERATOR, self.current_char, start_line, start_column))\n\n            elif self.current_char in DELIMITERS:\n                tokens.append(Token(TT_DELIMITER, self.current_char, self.line, self.column))\n                self.advance()\n\n            else:\n                # Unknown character\n                raise SyntaxError(f\"Unknown character: {self.current_char} at line {self.line}, column {self.column}\")\n\n        tokens.append(Token(TT_EOF, None, self.line, self.column))\n        return tokens", "parser.py": "from typing import List, Optional, Union\nfrom .lexer import Token, TT_INT, TT_FLOAT, TT_STRING, TT_IDENTIFIER, TT_KEYWORD, TT_OPERATOR, TT_DELIMITER, TT_NEWLINE, TT_EOF\nfrom .ast import (\n    ASTNode,\n    NumberNode,\n    StringNode,\n    BooleanNode,\n    NoneNode,\n    IdentifierNode,\n    BinaryOpNode,\n    UnaryOpNode,\n    AssignmentNode,\n    PrintNode,\n    IfNode,\n    RepeatNode,\n    FunctionDefNode,\n    FunctionCallNode,\n    ListNode,\n    IndexNode,\n    ReturnNode\n)\n\nclass Parser:\n    def __init__(self, tokens: List[Token]):\n        self.tokens = tokens\n        self.pos = 0\n        self.current_token = self.tokens[0] if self.tokens else None\n\n    def advance(self):\n        \"\"\"Move to the next token.\"\"\"\n        self.pos += 1\n        if self.pos >= len(self.tokens):\n            self.current_token = None\n        else:\n            self.current_token = self.tokens[self.pos]\n\n    def peek(self) -> Optional[Token]:\n        \"\"\"Look at the next token without consuming.\"\"\"\n        if self.pos + 1 < len(self.tokens):\n            return self.tokens[self.pos + 1]\n        return None\n\n    def expect(self, token_type: str, value: Optional[str] = None) -> Token:\n        \"\"\"Consume and return the current token if it matches expected type/value.\"\"\"\n        if not self.current_token:\n            raise SyntaxError(\"Unexpected end of input\")\n\n        if self.current_token.type != token_type:\n            raise SyntaxError(f\"Expected {token_type}, got {self.current_token.type} at line {self.current_token.line}, column {self.current_token.column}\")\n\n        if value is not None and self.current_token.value != value:\n            raise SyntaxError(f\"Expected '{value}', got '{self.current_token.value}' at line {self.current_token.line}, column {self.current_token.column}\")\n\n        token = self.current_token\n        self.advance()\n        r             raise SyntaxError(f\"Expected '=' after variable name in {var_type} declaration at line {self.current_token.line}, column {self.current_token.column}\")\n\n                self.advance()  # Consume the equals sign\n\n                # Expression\n                value = self.expression()\n\n                # Create assignment node with declaration info\n                return AssignmentNode(var_name, value, is_declaration=True, declaration_type=var_type)\n            elif self.current_token.value in ('true', 'false', 'null'):\n                # These can be used in expressions, but as statements they're just expressions\n                return self.expression_statement()\n        elif self.current_token.type == TT_IDENTIFIER:\n            # Check if it's an assignment or function call\n            if self.peek() and self.peek().type == TT_OPERATOR and self.peek().value == '=':\n                return self.assignment()\n            else:\n                return self.expression_statement()\n\n        # If we don't recognize a statement, treat it as an expression\n        return self.expression_statement()\n\n    def expression_statement(self) -> ASTNode:\n        \"\"\"Parse an expression and return it as a statement node.\"\"\"\n        expr = self.expression()\n        # For expression statements, we just return the expression\n        # In a real interpreter, we might wrap it in an ExpressionStatement node\n        return expr\n\n    def assignment(self) -> AssignmentNode:\n        \"\"\"Parse an assignment statement.\"\"\"\n        var_name = IdentifierNode(self.expect(TT_IDENTIFIER))\n        self.expect(TT_OPERATOR, '=')\n        value = self.expression()\n        return AssignmentNode(var_name, value)\n\n    def print_statement(self) -> PrintNode:\n        \"\"\"Parse a print statement.\"\"\"\n        self.expect(TT_KEYWORD, 'print')\n        expr = self.expression()\n        return PrintNode(expr)\n\n    def return_statement(self) -> ReturnNode:\n        \"\"\"Parse a return statement.\"\"\"\n        self.expect(TT_KEYWORD, 'return')\n        expr = self.expression()\n        return ReturnNode(expr)\n\n    def if_statement(self) -> IfNode:\n        \"\"\"Parse an if statement.\"\"\"\n        self.expect(TT_KEYWORD, 'if')\n        condition = self.expression()\n        self.expect(TT_DELIMITER, '{')\n        then_body = self.block()\n        self.expect(TT_DELIMITER, '}')\n\n        elif_clauses = []\n        while self.current_token and self.current_token.type == TT_KEYWORD and self.current_token.value == 'elif':\n            self.expect(TT_KEYWORD, 'elif')\n            condition = self.expression()\n            self.expect(TT_DELIMITER, '{')\n            body = self.block()\n            self.expect(TT_DELIMITER, '}')\n            elif_clauses.append((condition, body))\n\n        else_body = None\n        if self.current_token and self.current_token.type == TT_KEYWORD and self.current_token.value == 'else':\n            self.expect(TT_KEYWORD, 'else')\n            self.expect(TT_DELIMITER, '{')\n            else_body = self.block()\n            self.expect(TT_DELIMITER, '}')\n\n        return IfNode(condition, then_body, elif_clauses, else_body)\n\n    def repeat_statement(self) -> RepeatNode:\n        \"\"\"Parse a repeat/til loop.\"\"\"\n        self.expect(TT_KEYWORD, 'repeat')\n        self.expect(TT_DELIMITER, '{')\n        body = self.block()\n        self.expect(TT_DELIMITER, '}')\n        self.expect(TT_KEYWORD, 'til')\n        self.expect(TT_DELIMITER, '(')\n        condition = self.expression()\n        self.expect(TT_DELIMITER, ')')\n        return RepeatNode(body, condition)\n\n    def function_def(self) -> FunctionDefNode:\n        \"\"\"Parse a function definition.\"\"\"\n        self.expect(TT_KEYWORD, 'fn')\n        name = IdentifierNode(self.expect(TT_IDENTIFIER))\n        self.expect(TT_DELIMITER, '(')\n        params = []\n        if self.current_token and self.current_token.type != TT_DELIMITER:\n            while True:\n                params.append(IdentifierNode(self.expect(TT_IDENTIFIER)))\n                if self.current_token and self.current_token.type == TT_DELIMITER and self.current_token.value == ',':\n                    self.advance()\n                else:\n                    break\n        self.expect(TT_DELIMITER, ')')\n        self.expect(TT_DELIMITER, '{')\n        body = self.block()\n        self.expect(TT_DELIMITER, '}')\n        return FunctionDefNode(name, params, body)\n\n    def block(self) -> List[ASTNode]:\n        \"\"\"Parse a block of statements.\"\"\"\n        statements = []\n        while self.current_token and self.current_token.type != TT_DELIMITER:\n            if self.current_token.type == TT_NEWLINE:\n                self.advance()\n                continue\n            stmt = self.statement()\n            if stmt:\n                statements.append(stmt)\n        return statements\n\n    def expression(self) -> ASTNode:\n        \"\"\"Parse an expression (with precedence).\"\"\"\n        node = self.and_expression()\n\n        while self.current_token and ((self.current_token.type == TT_OPERATOR and self.current_token.value in ('or', '||')) or\n                                      (self.current_token.type == TT_IDENTIFIER and self.current_token.value in ('or',))):\n            op_token = self.current_token\n            self.advance()\n            right = self.and_expression()\n            node = BinaryOpNode(node, op_token, right)\n\n        return node\n\n    def and_expression(self) -> ASTNode:\n        \"\"\"Parse AND expressions.\"\"\"\n        node = self.comparison()\n\n        while self.current_token and ((self.current_token.type == TT_OPERATOR and self.current_token.value in ('and', '&&')) or\n                                      (self.current_token.type == TT_IDENTIFIER and self.current_token.value in ('and',))):\n            op_token = self.current_token\n            self.advance()\n            right = self.comparison()\n            node = BinaryOpNode(node, op_token, right)\n\n        return node\n\n    def comparison(self) -> ASTNode:\n        \"\"\"Parse comparison operations.\"\"\"\n        node = self.addition_subtraction()\n\n        while self.current_token and self.current_token.type == TT_OPERATOR and self.current_token.value in ('==', '!=', '<', '>', '<=', '>='):\n            op_token = self.current_token\n            self.advance()\n            right = self.addition_subtraction()\n            node = BinaryOpNode(node, op_token, right)\n\n        return node\n\n    def addition_subtraction(self) -> ASTNode:\n        \"\"\"Parse addition and subtraction operations.\"\"\"\n        node = self.multiplication_division()\n\n        while self.current_token and self.current_token.type == TT_OPERATOR and self.current_token.value in ('+', '-'):\n            op_token = self.current_token\n            self.advance()\n            right = self.multiplication_division()\n            node = BinaryOpNode(node, op_token, right)\n\n        return node\n\n    def multiplication_division(self) -> ASTNode:\n        \"\"\"Parse multiplication, division, and modulo operations.\"\"\"\n        node = self.power()\n\n        while self.current_token and self.current_token.type == TT_OPERATOR and self.current_token.value in ('*', '/', '%'):\n            op_token = self.current_token\n            self.advance()\n            right = self.power()\n            node = BinaryOpNode(node, op_token, right)\n\n        return node\n\n    def power(self) -> ASTNode:\n        \"\"\"Parse power operation.\"\"\"\n        return self.unary()\n\n    def unary(self) -> ASTNode:\n        \"\"\"Parse unary operations.\"\"\"\n        if self.current_token and ((self.current_token.type == TT_OPERATOR and self.current_token.value in ('!', '-')) or\n                                  (self.current_token.type == TT_IDENTIFIER and self.current_token.value == 'not')):\n            op_token = self.current_token\n            self.advance()\n            expr = self.unary()\n            return UnaryOpNode(op_token, expr)\n        return self.primary()\n\n    def primary(self) -> ASTNode:\n        \"\"\"Parse primary expressions.\"\"\"\n        if self.current_token.type == TT_INT or self.current_token.type == TT_FLOAT:\n            node = NumberNode(self.current_token)\n            self.advance()\n            return node\n        elif self.current_token.type == TT_STRING:\n            node = StringNode(self.current_token)\n            self.advance()\n            return node\n        elif self.current_token.type == TT_KEYWORD and self.current_token.value in ('true', 'false', 'null'):\n            if self.current_token.value == 'true':\n                node = BooleanNode(self.current_token)\n            elif self.current_token.value == 'false':\n                node = BooleanNode(self.current_token)\n            else:\n                node = NoneNode(self.current_token)\n            self.advance()\n            return node\n        # Handle built-in function calls (keywords that can be called as functions)\n        elif self.current_token.type == TT_KEYWORD and self.current_token.value in ('int', 'float', 'str', 'len'):\n            func_name = self.current_token.value\n            line = self.current_token.line\n            column = self.current_token.column\n            self.advance()  # Skip the function name keyword\n            # Expect opening parenthesis\n            self.expect(TT_DELIMITER, '(')\n            # Parse arguments\n            args = []\n            if self.current_token and self.current_token.type != TT_DELIMITER:\n                while True:\n                    args.append(self.expression())\n                    if self.current_token and self.current_token.type == TT_DELIMITER and self.current_token.value == ',':\n                        self.advance()\n                    else:\n                        break\n            # Expect closing parenthesis\n            self.expect(TT_DELIMITER, ')')\n            return FunctionCallNode(IdentifierNode(Token(TT_IDENTIFIER, func_name, line, column)), args)\n        elif self.current_token.type == TT_IDENTIFIER:\n            node = IdentifierNode(self.current_token)\n            self.advance()\n            # Check for function call\n            if self.current_token and self.current_token.type == TT_DELIMITER and self.current_token.value == '(':\n                self.advance()  # Skip '('\n                args = []\n                if self.current_token and self.current_token.type != TT_DELIMITER:\n                    while True:\n                        args.append(self.expression())\n                        if self.current_token and self.current_token.type == TT_DELIMITER and self.current_token.value == ',':\n                            self.advance()\n                        else:\n                            break\n                self.expect(TT_DELIMITER, ')')\n                return FunctionCallNode(node, args)\n            # Check for list/array indexing\n            elif self.current_token and self.current_token.type == TT_DELIMITER and self.current_token.value == '[':\n                self.advance()  # Skip '['\n                index = self.expression()\n                self.expect(TT_DELIMITER, ']')\n                return IndexNode(node, index)\n            return node\n        elif self.current_token.type == TT_DELIMITER and self.current_token.value == '(':\n            self.advance()  # Skip '('\n            node = self.expression()\n            self.expect(TT_DELIMITER, ')')\n            return node\n        elif self.current_token.type == TT_DELIMITER and self.current_token.value == '[':\n            # List literal\n            self.advance()  # Skip '['\n            elements = []\n            if self.current_token and self.current_token.type != TT_DELIMITER:\n                while True:\n                    elements.append(self.expression())\n                    if self.current_token and self.current_token.type == TT_DELIMITER and self.current_token.value == ',':\n                        self.advance()\n                    else:\n                        break\n            self.expect(TT_DELIMITER, ']')\n            return ListNode(elements)\n        else:\n            raise SyntaxError(f\"Unexpected token: {self.current_token} at line {self.current_token.line}, column {self.current_token.column}\")", "interpreter.py": "from typing import Any, List, Dict, Optional, Callable\nfrom .parser import *\n\nclass RuntimeError(Exception):\n    pass\n\nclass ReturnSignal(Exception):\n    def __init__(self, value):\n        self.value = value\n\nclass Function:\n    def __init__(self, name: str, params: List[str], body: List[ASTNode], closure: Optional['Environment'] = None):\n        self.name = name\n        self.params = params\n        self.body = body\n        self.closure = closure or {}\n\n    def call(self, args: List[Any], interpreter: 'Interpreter') -> Any:\n        # Create a new environment for this function call\n        env = Environment(self.closure)\n\n        # Bind parameters to arguments\n        for i, param in enumerate(self.params):\n            if i < len(args):\n                env.define(param, args[i])\n            else:\n                env.define(param, None)  # Default to None for missing args\n\n        # Execute function body\n        try:\n            interpreter.execute_block(self.body, env)\n        except ReturnSignal as ret:\n            return ret.value\n\n        return None  # Functions return None by default\n\nclass Environment:\n    def __init__(self, outer: Optional[Dict[str, tuple]] = None):\n        self.store: Dict[str, tuple] = {}  # Maps name to (value, is_constant)\n        self.outer = outer or {}\n\n    def define(self, name: str, value: Any, is_constant: bool = False):\n        self.store[name] = (value, is_constant)\n\n    def get(self, name: str) -> Any:\n        if name in self.store:\n            return self.store[name][0]  # Return just the value\n        elif name in self.outer:\n            # Handle outer environment - it might be in the old format or new format\n            val = self.outer[name]\n            if isinstance(val, tuple):\n                return val[0]  # New format: (value, is_constant)\n            else:\n                return val  # Old format: just value\n        else:\n            raise RuntimeError(f\"Undefined variable: '{name}'\")\n\n    def set(self, name: str, value: Any):\n        if name in self.store:\n            # Check if this variable is constant\n            if self.store[name][1]:  # is_constant flag\n                raise RuntimeError(f\"Cannot assign to constant '{name}'\")\n            self.store[name] = (value, self.store[name][1])  # Keep the same constancy\n        elif name in self.outer:\n            # Handle outer environment - check if it's constant there\n            val = self.outer[name]\n            if isinstance(val, tuple):\n                # New format: (value, is_constant)\n                if val[1]:  # is_constant flag\n                    raise RuntimeError(f\"Cannot assign to constant '{name}'\")\n                self.outer[name] = (value, val[1])  # Keep the same constancy\n            else:\n                # Old format: just value (assume mutable for backward compatibility)\n                self.outer[name] = value\n        else:\n            # Variable doesn't exist in either scope - treat as new mutable variable\n            # In a language with declarations, this might be an error,\n            # but for simplicity we'll treat it as defining a new mutable variable\n            self.store[name] = (value, False)\n\nclass Interpreter:\n    def __init__(self):\n        self.global_env = Environment()\n        self.setup_builtins()\n\n    def setup_builtins(self):\n        \"\"\"Set up built-in functions and values.\"\"\"\n        self.global_env.define(\"print\", BuiltinFunction(\"print\", self._builtin_print))\n        self.global_env.define(\"input\", BuiltinFunction(\"input\", self._builtin_input))\n        self.global_env.define(\"int\", BuiltinFunction(\"int\", self._builtin_int))\n        self.global_env.define(\"float\", BuiltinFunction(\"float\", self._builtin_float))\n        self.global_env.define(\"str\", BuiltinFunction(\"str\", self._builtin_str))\n        self.global_env.define(\"len\", BuiltinFunction(\"len\", self._builtin_len))\n        self.global_env.define(\"type\", BuiltinFunction(\"type\", self._builtin_type))\n        self.global_env.define(\"abs\", BuiltinFunction(\"abs\", self._builtin_abs))\n        self.global_env.define(\"max\", BuiltinFunction(\"max\", self._builtin_max))\n        self.global_env.define(\"min\", BuiltinFunction(\"min\", self._builtin_min))\n        self.global_env.define(\"round\", BuiltinFunction(\"round\", self._builtin_round))\n        self.global_env.define(\"pow\", BuiltinFunction(\"pow\", self._builtin_pow))\n\n        # Boolean values\n        self.global_env.define(\"true\", True)\n        self.global_env.define(\"false\", False)\n        self.global_env.define(\"null\", None)\n\n    def _builtin_print(self, args: List[Any]) -> None:\n        print(\" \".join(str(arg) for arg in args))\n        return None\n\n    def _builtin_input(self, args: List[Any]) -> str:\n        prompt = args[0] if args else \"\"\n        return input(str(prompt))\n\n    def _builtin_int(self, args: List[Any]) -> int:\n        return int(args[0])\n\n    def _builtin_float(self, args: List[Any]) -> float:\n        return float(args[0])\n\n    def _builtin_str(self, args: List[Any]) -> str:\n        obj = args[0]\n        if obj is None:\n            return \"null\"\n        return str(obj)\n\n    def _builtin_len(self, args: List[Any]) -> int:\n        obj = args[0]\n        if hasattr(obj, '__len__'):\n            return len(obj)\n        else:\n            raise RuntimeError(f\"Object of type {type(obj).__name__} has no len()\")\n\n    def _builtin_type(self, args: List[Any]) -> str:\n        obj = args[0]\n        if isinstance(obj, bool):\n            return \"bool\"\n        elif isinstance(obj, int):\n            return \"int\"\n        elif isinstance(obj, float):\n            return \"float\"\n        elif isinstance(obj, str):\n            return \"str\"\n        elif isinstance(obj, list):\n            return \"list\"\n        elif obj is None:\n            return \"null\"\n        else:\n            return type(obj).__name__\n\n    def _builtin_abs(self, args: List[Any]) -> float:\n        return abs(args[0])\n\n    def _builtin_max(self, args: List[Any]) -> Any:\n        return max(args)\n\n    def _builtin_min(self, args: List[Any]) -> Any:\n        return min(args)\n\n    def _builtin_round(self, args: List[Any]) -> float:\n        return round(args[0])\n\n    def _builtin_pow(self, args: List[Any]) -> float:\n        return pow(args[0], args[1])\n\n    def execute(self, statements: List[ASTNode], is_top_level: bool = True):\n        \"\"\"Execute a list of statements.\"\"\"\n        for stmt in statements:\n            self.execute_statement(stmt)\n        # Call main function if defined (only for top-level execution)\n        if is_top_level:\n            try:\n                main_func = self.global_env.get(\"main\")\n            except RuntimeError:\n                main_func = None\n            if main_func is not None and isinstance(main_func, Function):\n                try:\n                    main_func.call([], self)\n                except ReturnSignal:\n                    # Ignore return value from main\n                    pass\n\n    def interpret(self, ast):\n        \"\"\"Alias for execute method for compatibility with main.py.\"\"\"\n        return self.execute(ast, True)\n\n    def execute_statement(self, stmt: ASTNode):\n        \"\"\"Execute a single statement.\"\"\"\n        if isinstance(stmt, NumberNode):\n            # Number literals as statements don't do anything\n            pass\n        elif isinstance(stmt, StringNode):\n            # String literals as statements don't do anything\n            pass\n        elif isinstance(stmt, BooleanNode):\n            # Boolean literals as statements don't do anything\n            pass\n        elif isinstance(stmt, NoneNode):\n            # None literals as statements don't do anything\n            pass\n        elif isinstance(stmt, IdentifierNode):\n            # Variable access as statement - just evaluate but don't store result\n            self.evaluate(stmt)\n        elif isinstance(stmt, BinaryOpNode):\n            self.evaluate(stmt)\n        elif isinstance(stmt, UnaryOpNode):\n            self.evaluate(stmt)\n        elif isinstance(stmt, AssignmentNode):\n            self.visit_assignment(stmt)\n        elif isinstance(stmt, PrintNode):\n            self.visit_print(stmt)\n        elif isinstance(stmt, IfNode):\n            self.visit_if(stmt)\n        elif isinstance(stmt, RepeatNode):\n            self.visit_repeat(stmt)\n        elif isinstance(stmt, FunctionDefNode):\n            self.visit_function_def(stmt)\n        elif isinstance(stmt, FunctionCallNode):\n            self.visit_function_call(stmt)\n        elif isinstance(stmt, ReturnNode):\n            return self.visit_return(stmt)\n        elif isinstance(stmt, ListNode):\n            # List literals as statements don't do anything\n            pass\n        elif isinstance(stmt, IndexNode):\n            self.evaluate(stmt)\n        else:\n            raise RuntimeError(f\"Unknown statement type: {type(stmt)}\")\n\n    def execute_block(self, statements: List[ASTNode], environment: Environment):\n        \"\"\"Execute a block of statements in a specific environment.\"\"\"\n        previous_env = self.global_env\n        self.global_env = environment\n        try:\n            self.execute(statements, False)\n        finally:\n            self.global_env = previous_env\n\n    def evaluate(self, expr: ASTNode) -> Any:\n        \"\"\"Evaluate an expression and return its value.\"\"\"\n        if isinstance(expr, NumberNode):\n            return expr.value\n        elif isinstance(expr, StringNode):\n            return expr.value\n        elif isinstance(expr, BooleanNode):\n            return expr.value\n        elif isinstance(expr, NoneNode):\n            return expr.value\n        elif isinstance(expr, IdentifierNode):\n            return self.visit_identifier(expr)\n        elif isinstance(expr, BinaryOpNode):\n            return self.visit_binary_op(expr)\n        elif isinstance(expr, UnaryOpNode):\n            return self.visit_unary_op(expr)\n        elif isinstance(expr, FunctionCallNode):\n            return self.visit_function_call(expr)\n        elif isinstance(expr, ListNode):\n            return self.visit_list(expr)\n        elif isinstance(expr, IndexNode):\n            return self.visit_index(expr)\n        else:\n            raise RuntimeError(f\"Cannot evaluate expression type: {type(expr)}\")\n\n    def visit_identifier(self, node: IdentifierNode) -> Any:\n        \"\"\"Visit an identifier node.\"\"\"\n        return self.global_env.get(node.name)\n\n    def visit_binary_op(self, node: BinaryOpNode) -> Any:\n        \"\"\"Visit a binary operation node.\"\"\"\n        left = self.evaluate(node.left)\n        right = self.evaluate(node.right)\n        op = node.op.value\n\n        if op == '+':\n            return left + right\n        elif op == '-':\n            return left - right\n        elif op == '*':\n            return left * right\n        elif op == '/':\n            if right == 0:\n                raise RuntimeError(\"Division by zero\")\n            return left / right\n        elif op == '%':\n            if right == 0:\n                raise RuntimeError(\"Modulo by zero\")\n            return left % right\n        elif op == '==':\n            return left == right\n        elif op == '!=':\n            return left != right\n        elif op == '<':\n            return left < right\n        elif op == '>':\n            return left > right\n        elif op == '<=':\n            return left <= right\n        elif op == '>=':\n            return left >= right\n        elif op == 'and':\n            return bool(left) and bool(right)\n        elif op == 'or':\n            return bool(left) or bool(right)\n        elif op == '&&':\n            return bool(left) and bool(right)\n        elif op == '||':\n            return bool(left) or bool(right)\n        else:\n            raise RuntimeError(f\"Unknown operator: {op}\")\n\n    def visit_unary_op(self, node: UnaryOpNode) -> Any:\n        \"\"\"Visit a unary operation node.\"\"\"\n        operand = self.evaluate(node.expr)\n        op = node.op.value\n\n        if op == '-':\n            return -operand\n        elif op == '!':\n            return not operand\n        elif op == 'not':\n            return not operand\n        else:\n            raise RuntimeError(f\"Unknown unary operator: {op}\")\n\n    def visit_assignment(self, node: AssignmentNode):\n        \"\"\"Visit an assignment node.\"\"\"\n        value = self.evaluate(node.value)\n        var_name = node.var_name.name\n\n        if node.is_declaration:\n            # This is a variable declaration (var or dec)\n            if node.declaration_type == 'dec':\n                # 'dec' means constant/immutable\n                self.global_env.define(var_name, value, is_constant=True)\n            else:\n                # 'var' or default means mutable\n                self.global_env.define(var_name, value, is_constant=False)\n        else:\n            # This is a regular assignment (reassignment)\n            self.global_env.set(var_name, value)\n\n    def visit_print(self, node: PrintNode):\n        \"\"\"Visit a print node.\"\"\"\n        value = self.evaluate(node.expression)\n        print(value)\n\n    def visit_if(self, node: IfNode):\n        \"\"\"Visit an if node.\"\"\"\n        condition = self.evaluate(node.condition)\n        if condition:\n            self.execute(node.then_body)\n        else:\n            # Check elif clauses\n            for condition, body in node.elif_clauses:\n                if self.evaluate(condition):\n                    self.execute(body)\n                    return\n            # If no elif matched, execute else block if present\n            if node.else_body:\n                self.execute(node.else_body)\n\n    def visit_repeat(self, node: RepeatNode):\n        \"\"\"Visit a repeat/til loop node.\"\"\"\n        while True:\n            self.execute(node.body)\n            if self.evaluate(node.condition):\n                break\n\n    def visit_return(self, node: ReturnNode) -> None:\n        \"\"\"Handle return statement by raising ReturnSignal.\"\"\"\n        value = self.evaluate(node.expr)\n        raise ReturnSignal(value)\n\n    def visit_function_def(self, node: FunctionDefNode):\n        \"\"\"Visit a function definition node.\"\"\"\n        func = Function(node.name.name, [p.name for p in node.params], node.body, self.global_env.store)\n        self.global_env.define(node.name.name, func)\n\n    def visit_function_call(self, node: FunctionCallNode) -> Any:\n        \"\"\"Visit a function call node.\"\"\"\n        func_name = node.name.name\n        func = self.global_env.get(func_name)\n\n        if isinstance(func, Function):\n            args = [self.evaluate(arg) for arg in node.args]\n            return func.call(args, self)\n        elif isinstance(func, BuiltinFunction):\n            args = [self.evaluate(arg) for arg in node.args]\n            return func.func(args)\n        else:\n            raise RuntimeError(f\"'{func_name}' is not a function\")\n\n    def visit_list(self, node: ListNode) -> List[Any]:\n        \"\"\"Visit a list node.\"\"\"\n        return [self.evaluate(element) for element in node.elements]\n\n    def visit_index(self, node: IndexNode) -> Any:\n        \"\"\"Visit an index node.\"\"\"\n        obj = self.evaluate(node.obj)\n        index = self.evaluate(node.index)\n\n        if isinstance(obj, (str, list)):\n            return obj[index]\n        else:\n            raise RuntimeError(f\"Object of type {type(obj).__name__} is not subscriptable\")\n\nclass BuiltinFunction:\n    def __init__(self, name: str, func: Callable[[List[Any]], Any]):\n        self.name = name\n        self.func = func"}</script>
